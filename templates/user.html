<!-- File: templates/user.html -->
<!-- User Panel - Mobile First -->
<!-- ============================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BEAST - User Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: white;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0a0a, #050505);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .username {
            font-size: 14px;
            color: #ff4444;
        }
        
        .logout-btn {
            background: rgba(255, 0, 0, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        
        /* Stats Cards */
        .stats-row {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #0a0a0a;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            background: #111;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ff4444;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        
        /* Panel */
        .panel {
            padding: 16px;
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ff4444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Form Elements */
        select, input, textarea {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #ff0000;
        }
        
        textarea {
            font-family: monospace;
            resize: vertical;
            min-height: 120px;
        }
        
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
        }
        
        .btn-secondary {
            background: #222;
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .button-group .btn {
            flex: 1;
        }
        
        /* Results */
        .results-container {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result-item {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #ff0000;
        }
        
        .result-item.approved {
            border-left-color: #00ff00;
        }
        
        .result-item.declined {
            border-left-color: #ff0000;
        }
        
        .result-card {
            font-size: 13px;
            font-family: monospace;
        }
        
        .result-status {
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-approved {
            color: #00ff00;
        }
        
        .badge-declined {
            color: #ff4444;
        }
        
        .result-response {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        
        /* Site Management */
        .site-item {
            background: #111;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .site-info {
            flex: 1;
        }
        
        .site-url {
            font-size: 14px;
            font-weight: 500;
        }
        
        .site-name {
            font-size: 11px;
            color: #666;
        }
        
        .delete-site {
            background: rgba(255, 0, 0, 0.2);
            border: none;
            color: #ff4444;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .add-site {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .add-site input {
            flex: 1;
            margin-bottom: 0;
        }
        
        .add-site .btn {
            width: auto;
            padding: 14px 16px;
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 0, 0, 0.3);
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .processing-text {
            margin-top: 16px;
            color: #ff4444;
            font-size: 14px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            background: #0a0a0a;
            padding: 12px 16px;
            position: sticky;
            top: 60px;
            z-index: 99;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #111;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            background: #ff0000;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* File upload */
        .file-upload-label {
            background: #222;
            padding: 14px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }
        
        #fileInput {
            display: none;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #111;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🔥 BEAST AUTO STRIPE</div>
        <div class="user-menu">
            <span class="username">{{ username }}</span>
            <div class="logout-btn" onclick="logout()">Exit</div>
        </div>
    </div>
    
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <div class="stat-value" id="statChecks">-</div>
            <div class="stat-label">Total Checks</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statApproved">-</div>
            <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statDeclined">-</div>
            <div class="stat-label">Declined</div>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('checker')">Checker</div>
        <div class="tab" onclick="switchTab('sites')">Sites</div>
        <div class="tab" onclick="switchTab('logs')">History</div>
    </div>
    
    <!-- Checker Tab -->
    <div id="checkerTab" class="tab-content active">
        <div class="panel">
            <div class="panel-title">
                <span>🎯</span> Select Target Site
            </div>
            <select id="siteSelect">
                <option value="">-- Select Site --</option>
            </select>
            
            <div class="panel-title">
                <span>💳</span> Enter Cards
            </div>
            <textarea id="cardsInput" placeholder="4147768578745265|04|2026|168
4111111111111111|12|2028|123
4242424242424242|06|2027|456"></textarea>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="checkCards()">▶ Check Cards</button>
                <label class="file-upload-label btn-secondary" style="text-align: center;">
                    📁 Upload TXT
                    <input type="file" id="fileInput" accept=".txt" onchange="uploadFile(this)">
                </label>
                <button class="btn btn-secondary" onclick="clearResults()">🗑 Clear</button>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-title">
                <span>📊</span> Results
            </div>
            <div class="results-container" id="resultsContainer">
                <div style="text-align: center; color: #666; padding: 40px;">
                    No results yet.<br>Select site, paste cards, and click Check.
                </div>
            </div>
        </div>
    </div>
    
    <!-- Sites Tab -->
    <div id="sitesTab" class="tab-content">
        <div class="panel">
            <div class="panel-title">
                <span>🌐</span> My Sites
            </div>
            <div class="add-site">
                <input type="text" id="newSiteUrl" placeholder="example.com or https://example.com">
                <button class="btn btn-primary" onclick="addSite()">Add</button>
            </div>
            <div id="sitesList"></div>
        </div>
    </div>
    
    <!-- Logs Tab -->
    <div id="logsTab" class="tab-content">
        <div class="panel">
            <div class="panel-title">
                <span>📜</span> Check History
            </div>
            <div class="results-container" id="logsContainer">
                <div style="text-align: center; color: #666; padding: 40px;">
                    Loading logs...
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="processing-text">Processing Cards... <span id="progressCount">0</span>/<span id="totalCount">0</span></div>
    </div>
    
    <script>
        let currentResults = [];
        
        // Load initial data
        loadSites();
        loadStats();
        loadLogs();
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'checker') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('checkerTab').classList.add('active');
            } else if (tab === 'sites') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('sitesTab').classList.add('active');
                loadSites();
            } else if (tab === 'logs') {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('logsTab').classList.add('active');
                loadLogs();
            }
        }
        
        function loadSites() {
            fetch('/api/sites')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('siteSelect');
                    select.innerHTML = '<option value="">-- Select Site --</option>';
                    
                    const sitesList = document.getElementById('sitesList');
                    sitesList.innerHTML = '';
                    
                    data.sites.forEach(site => {
                        select.innerHTML += `<option value="${site.url}">${site.name || site.url}</option>`;
                        sitesList.innerHTML += `
                            <div class="site-item">
                                <div class="site-info">
                                    <div class="site-url">${site.url}</div>
                                    <div class="site-name">Added: ${new Date(site.created_at).toLocaleDateString()}</div>
                                </div>
                                <button class="delete-site" onclick="deleteSite(${site.id})">🗑</button>
                            </div>
                        `;
                    });
                    
                    if (data.sites.length === 0) {
                        sitesList.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">No sites added yet.</div>';
                    }
                });
        }
        
        function addSite() {
            const url = document.getElementById('newSiteUrl').value.trim();
            if (!url) {
                alert('Enter site URL');
                return;
            }
            
            fetch('/api/sites', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    document.getElementById('newSiteUrl').value = '';
                    loadSites();
                } else {
                    alert(data.error);
                }
            });
        }
        
        function deleteSite(id) {
            if (confirm('Remove this site?')) {
                fetch(`/api/sites/${id}`, {method: 'DELETE'})
                    .then(() => loadSites());
            }
        }
        
        function checkCards() {
            const site = document.getElementById('siteSelect').value;
            const cardText = document.getElementById('cardsInput').value;
            
            if (!site) {
                alert('Select a site first');
                return;
            }
            if (!cardText.trim()) {
                alert('Enter cards to check');
                return;
            }
            
            const cards = cardText.split('\n').filter(c => c.trim() && c.includes('|'));
            if (cards.length === 0) {
                alert('No valid cards. Format: NUMBER|MM|YYYY|CVV');
                return;
            }
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('totalCount').innerText = cards.length;
            document.getElementById('progressCount').innerText = '0';
            document.getElementById('resultsContainer').innerHTML = '';
            
            fetch('/api/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({site, card_text: cardText})
            }).then(res => res.json()).then(data => {
                document.getElementById('loadingOverlay').style.display = 'none';
                
                if (data.results) {
                    displayResults(data.results);
                    loadStats();
                    loadLogs();
                } else if (data.error) {
                    alert(data.error);
                }
            }).catch(err => {
                document.getElementById('loadingOverlay').style.display = 'none';
                alert('Error: ' + err.message);
            });
        }
        
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            let approved = 0, declined = 0;
            
            results.forEach((result, index) => {
                const isApproved = result.status === 'Approved';
                if (isApproved) approved++;
                else declined++;
                
                const resultDiv = document.createElement('div');
                resultDiv.className = `result-item ${isApproved ? 'approved' : 'declined'}`;
                resultDiv.innerHTML = `
                    <div>
                        <div class="result-card">${result.card}</div>
                        <div class="result-response">${result.response}</div>
                    </div>
                    <div>
                        <span class="result-status ${isApproved ? 'badge-approved' : 'badge-declined'}">
                            ${isApproved ? '✓ APPROVED' : '✗ DECLINED'}
                        </span>
                    </div>
                `;
                container.appendChild(resultDiv);
            });
            
            const summary = document.createElement('div');
            summary.style.cssText = 'margin-top: 16px; padding: 12px; background: #111; border-radius: 12px; text-align: center;';
            summary.innerHTML = `
                <span style="color:#00ff00;">✓ Approved: ${approved}</span> &nbsp;|&nbsp;
                <span style="color:#ff4444;">✗ Declined: ${declined}</span> &nbsp;|&nbsp;
                <span>Total: ${results.length}</span>
            `;
            container.appendChild(summary);
        }
        
        function clearResults() {
            document.getElementById('resultsContainer').innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">Results cleared.</div>';
            document.getElementById('cardsInput').value = '';
        }
        
        function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('cardsInput').value = e.target.result;
            };
            reader.readAsText(file);
            input.value = '';
        }
        
        function loadStats() {
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('statChecks').innerText = data.total_checks || 0;
                    document.getElementById('statApproved').innerText = data.approved || 0;
                    document.getElementById('statDeclined').innerText = data.declined || 0;
                });
        }
        
        function loadLogs() {
            fetch('/api/logs')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('logsContainer');
                    if (!data.logs || data.logs.length === 0) {
                        container.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">No logs yet.</div>';
                        return;
                    }
                    
                    container.innerHTML = data.logs.map(log => `
                        <div class="result-item ${log.status === 'Approved' ? 'approved' : 'declined'}">
                            <div>
                                <div class="result-card">${log.card}</div>
                                <div class="result-response">${log.site} - ${log.response}</div>
                            </div>
                            <div>
                                <span class="result-status ${log.status === 'Approved' ? 'badge-approved' : 'badge-declined'}">
                                    ${log.status}
                                </span>
                                <div style="font-size: 9px; color: #444; margin-top: 4px;">${new Date(log.checked_at).toLocaleString()}</div>
                            </div>
                        </div>
                    `).join('');
                });
        }
        
        function logout() {
            window.location.href = '/logout';
        }
        
        // Auto refresh
        setInterval(() => {
            loadStats();
        }, 30000);
    </script>
</body>
</html>
