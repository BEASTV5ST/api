<!-- File: templates/login.html -->
<!-- Mobile-first login page -->
<!-- ============================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BEAST AUTO STRIPE - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .login-container {
            background: #0a0a0a;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.1);
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-bottom: 32px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #141414;
            border-radius: 12px;
            padding: 4px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: #ff0000;
            color: white;
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #ff0000;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-telegram {
            background: linear-gradient(135deg, #0088cc, #006699);
            margin-top: 12px;
        }
        
        .error-msg {
            color: #ff4444;
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
        }
        
        .switch-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .switch-text span {
            color: #ff4444;
            cursor: pointer;
        }
        
        hr {
            border-color: #222;
            margin: 20px 0;
        }
        
        .admin-note {
            text-align: center;
            color: #444;
            font-size: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔥 BEAST VIP 🔥</div>
        <div class="subtitle">Professional Stripe Checker Panel</div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm" class="login-form active">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="btn" onclick="manualLogin()">Login</button>
            <button class="btn btn-telegram" onclick="telegramLogin()">
                <span>📱</span> Login with Telegram
            </button>
            <div id="loginError" class="error-msg"></div>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="login-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Choose username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Choose password">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Confirm password">
            </div>
            <button class="btn" onclick="manualRegister()">Create Account</button>
            <div id="regError" class="error-msg"></div>
        </div>
        
        <hr>
        
        <div class="admin-note">
            🔐 CHECKER BY @BEASTxOFFICIAL
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab-btn').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        function manualLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.innerText = 'Please enter username and password';
                return;
            }
            
            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/user';
                    }
                } else {
                    errorDiv.innerText = data.error || 'Login failed';
                }
            }).catch(() => {
                errorDiv.innerText = 'Network error';
            });
        }
        
        function manualRegister() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const errorDiv = document.getElementById('regError');
            
            if (!username || !password) {
                errorDiv.innerText = 'Please fill all fields';
                return;
            }
            if (password !== confirm) {
                errorDiv.innerText = 'Passwords do not match';
                return;
            }
            if (password.length < 4) {
                errorDiv.innerText = 'Password must be at least 4 characters';
                return;
            }
            
            fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    errorDiv.style.color = '#00ff00';
                    errorDiv.innerText = 'Account created! Please login.';
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').value = '';
                        errorDiv.innerText = '';
                    }, 1500);
                } else {
                    errorDiv.innerText = data.error || 'Registration failed';
                }
            }).catch(() => {
                errorDiv.innerText = 'Network error';
            });
        }
        
        function telegramLogin() {
            // Simple Telegram login prompt - gets user info
            const chatId = prompt('Enter your Telegram Chat ID (or any unique ID):');
            const name = prompt('Enter your Telegram Name:');
            
            if (chatId && name) {
                fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({telegram_id: chatId, telegram_name: name})
                }).then(res => res.json()).then(data => {
                    if (data.success) {
                        if (data.role === 'admin') {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = '/user';
                        }
                    }
                }).catch(() => {
                    alert('Login failed');
                });
            }
        }
        
        // Check if already logged in
        fetch('/api/stats').then(res => {
            if (res.status === 200) {
                res.json().then(() => {
                    window.location.href = '/';
                });
            }
        }).catch(() => {});
    </script>
</body>
</html>
